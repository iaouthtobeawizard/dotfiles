include colors/colors.conf

font_family JetBrains Mono Font Mono 
font_size 13

disable_ligatures yes
enable_audio_bell no 

shell_integration disabled

cursor_shape block 

url_style curly 

intial_window_width 78c
intial_window_heigth 23c
window_padding_width 25
cursor_blink_interval 0

background_opacity 0.8
scrollbar_handle_opacity 0
scroll_track_opacity 0
scroll_track_hover_opacity 0
confirm_os_window_close 0

sync_to_monitor no

repaint_delay 8
input_delay 3

cursor_trail 3 
